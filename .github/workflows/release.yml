name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-mac-x64:
    runs-on: macos-13
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - run: npm run build && npx electron-builder --mac --x64 --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ELECTRON_BUILDER_BINARIES_MIRROR: https://github.com/electron-userland/electron-builder-binaries/releases/download/

  build-mac-arm64:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Patch dmg-builder mirror URL
        run: |
          FILE=$(find node_modules -path "*/dmg-builder/out/dmgUtil.js" | head -1)
          echo "Patching: $FILE"
          sed -i '' \
            's|https://cdn.npmmirror.com/binaries/electron|https://github.com/electron-userland/electron-builder-binaries/releases/download|g' \
            "$FILE"
          echo "Done. Verifying patch:"
          grep -n "github.com/electron-userland" "$FILE" | head -5

      - name: Pre-download dmg-builder binary
        run: |
          # electron-builder looks here on macOS
          DIR="$HOME/Library/Caches/electron-builder/dmg-builder/dmg-builder-1.2.0"
          mkdir -p "$DIR"
          curl -L "https://github.com/electron-userland/electron-builder-binaries/releases/download/dmg-builder%401.2.0/dmgbuild-bundle-arm64-75c8a6c.tar.gz" \
            -o "$DIR/dmgbuild-bundle-arm64-75c8a6c.tar.gz"
          echo "Downloaded to: $DIR"
          ls -la "$DIR"

      - run: npm run build && npx electron-builder --mac --arm64 --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
