name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-mac-x64:
    runs-on: macos-13
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - run: npm run build && npx electron-builder --mac --x64 --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ELECTRON_BUILDER_BINARIES_MIRROR: https://github.com/electron-userland/electron-builder-binaries/releases/download/

  build-mac-arm64:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Debug and patch dmg-builder
        run: |
          echo "=== Finding dmg-builder files ==="
          find node_modules -name "dmgUtil.js" 2>/dev/null
          find node_modules -name "*.js" | xargs grep -l "cdn.npmmirror.com" 2>/dev/null

          echo "=== Patching ALL files with the bad URL ==="
          find node_modules -name "*.js" | xargs grep -l "cdn.npmmirror.com" 2>/dev/null | while read file; do
            echo "Patching: $file"
            sed -i '' 's|https://cdn.npmmirror.com/binaries/electron|https://github.com/electron-userland/electron-builder-binaries/releases/download|g' "$file"
          done

          echo "=== Verifying no bad URLs remain ==="
          find node_modules -name "*.js" | xargs grep -l "cdn.npmmirror.com" 2>/dev/null && echo "STILL HAS BAD URL" || echo "ALL CLEAN"

      - name: Pre-download dmg-builder binary
        run: |
          # electron-builder looks here on macOS
          DIR="$HOME/Library/Caches/electron-builder/dmg-builder/dmg-builder-1.2.0"
          mkdir -p "$DIR"
          curl -L "https://github.com/electron-userland/electron-builder-binaries/releases/download/dmg-builder%401.2.0/dmgbuild-bundle-arm64-75c8a6c.tar.gz" \
            -o "$DIR/dmgbuild-bundle-arm64-75c8a6c.tar.gz"
          echo "Downloaded to: $DIR"
          ls -la "$DIR"

      - run: npm run build && npx electron-builder --mac --arm64 --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
