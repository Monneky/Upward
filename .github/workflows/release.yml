name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-mac-x64:
    runs-on: macos-13
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - run: npm run build && npx electron-builder --mac --x64 --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ELECTRON_BUILDER_BINARIES_MIRROR: https://github.com/electron-userland/electron-builder-binaries/releases/download/

  build-mac-arm64:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Find and patch mirror URL
        run: |
          echo "=== Searching ALL file types ==="
          grep -rn "cdn.npmmirror.com" node_modules/ -l 2>/dev/null || echo "Not found in node_modules"

          echo "=== Searching in app-builder-lib specifically ==="
          grep -rn "npmmirror" node_modules/app-builder-lib/ -l 2>/dev/null || echo "Not in app-builder-lib"

          echo "=== Searching in builder-util-runtime ==="
          grep -rn "npmmirror\|mirror" node_modules/builder-util-runtime/ -l 2>/dev/null || echo "Not in builder-util-runtime"

          echo "=== Show where the download URL is built ==="
          grep -rn "npmmirror\|binaries/electron\|releaseType\|dmg-builder" node_modules/app-builder-lib/out/ 2>/dev/null | head -20

      - name: Pre-download dmg-builder binary
        run: |
          # electron-builder looks here on macOS
          DIR="$HOME/Library/Caches/electron-builder/dmg-builder/dmg-builder-1.2.0"
          mkdir -p "$DIR"
          curl -L "https://github.com/electron-userland/electron-builder-binaries/releases/download/dmg-builder%401.2.0/dmgbuild-bundle-arm64-75c8a6c.tar.gz" \
            -o "$DIR/dmgbuild-bundle-arm64-75c8a6c.tar.gz"
          echo "Downloaded to: $DIR"
          ls -la "$DIR"

      - run: npm run build && npx electron-builder --mac --arm64 --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
