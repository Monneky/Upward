appId: com.upward.app
productName: Upward

directories:
  buildResources: build
  output: dist

files:
  - out/**/*
  - node_modules/**/*
  - package.json

extraMetadata:
  main: out/main/index.js

mac:
  category: public.app-category.productivity
  target: dmg

dmg:
  writeUpdateInfo: false

publish:
  provider: github
  owner: Monneky
  repo: Upward
  releaseType: release

npmRebuild: true
