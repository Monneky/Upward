appId: com.upward.app
productName: Upward

directories:
  buildResources: build
  output: dist

files:
  - out/**/*
  - node_modules/**/*
  - package.json

extraMetadata:
  main: out/main/index.js

mac:
  category: public.app-category.productivity
  target: dmg

win:
  target:
    - target: nsis
      arch:
        - x64

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true

linux:
  target:
    - target: AppImage
      arch:
        - x64
  category: Utility

dmg:
  writeUpdateInfo: false

publish:
  provider: github
  owner: Monneky
  repo: Upward
  releaseType: release

npmRebuild: true
