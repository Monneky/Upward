<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <script>
      (function () {
        var mode = localStorage.getItem('themeMode')
        var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches
        var theme = 'dark'
        if (mode === 'light' || mode === 'dark') theme = mode
        else if (mode === 'system') theme = prefersDark ? 'dark' : 'light'
        document.documentElement.classList.add(theme === 'dark' ? 'theme-dark' : 'theme-light')
      })()
    </script>
    <title>Upward</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&display=swap"
      rel="stylesheet"
    />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:"
    />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
